  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Oxanium:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      color: #ffffff;
      margin: 0;
      overflow-x: hidden;
      /* Kill the grey flash on tap and the iOS "long-press" callout */
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html {
      scroll-behavior: smooth;
      /* Stop iOS from auto-inflating type in landscape */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Safe-area aware spacing helpers (notch / Dynamic Island / home indicator).
       On non-notched devices env() resolves to 0, so these collapse to the
       desktop spacing baked into the max() floor. */
    .pt-safe { padding-top: max(1.5rem, calc(env(safe-area-inset-top) + 0.5rem)); }
    .pb-safe { padding-bottom: max(1.5rem, calc(env(safe-area-inset-bottom) + 0.5rem)); }
    .px-safe {
      padding-left: max(1.5rem, env(safe-area-inset-left));
      padding-right: max(1.5rem, env(safe-area-inset-right));
    }
    .bottom-safe { bottom: max(2rem, calc(env(safe-area-inset-bottom) + 0.75rem)); }

    /* 16px is the threshold below which iOS Safari zooms the page on focus.
       Keep every text field at/above it on small screens. */
    @media (max-width: 640px) {
      input, select, textarea { font-size: 16px; }
    }
    .font-heading {
      font-family: 'Space Grotesk', sans-serif;
    }
    .font-display {
      font-family: 'Oxanium', 'Space Grotesk', sans-serif;
    }
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }
  </style>

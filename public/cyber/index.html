<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Tracer Cyber — Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Oxanium:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050608;
    --panel:#0c0e13;
    --line:rgba(255,255,255,.08);
    --line-strong:rgba(255,255,255,.18);
    --text:#eef2f7;
    --muted:#8a93a6;
    --dim:#525a6e;
    --accent:#5eead4;
    --accent-soft:rgba(94,234,212,.10);
    --accent-strong:rgba(94,234,212,.45);
    --danger:#ef4444;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --display:'Oxanium','Space Grotesk','Inter',sans-serif;
    --ease:cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);min-height:100%}
  body{
    font-family:var(--sans);color:var(--text);line-height:1.55;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse 60% 60% at 50% 40%, rgba(94,234,212,.06), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 110%, rgba(94,234,212,.04), transparent 60%),
      var(--bg);
    overflow:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:48px 48px;
    mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, #000 30%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, #000 30%, transparent 90%);
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 100% 80% at 50% 0%, transparent 30%, rgba(0,0,0,.7) 100%);
  }
  ::selection{background:var(--accent);color:var(--bg)}

  .stage{
    position:relative;z-index:1;
    width:100%;max-width:440px;padding:32px;
  }

  .badge{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--muted);
    padding:6px 12px;border:1px solid var(--line);border-radius:999px;
    background:rgba(255,255,255,.02);
    margin-bottom:24px;
  }
  .badge .dot{
    width:6px;height:6px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 12px var(--accent-strong);
    animation:pulse 2.4s var(--ease) infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:.6;transform:scale(1)}
    50%{opacity:1;transform:scale(1.25)}
  }

  .brand{
    display:flex;align-items:center;gap:16px;margin-bottom:28px;
  }
  .brand img{
    height:48px;width:auto;
    filter:invert(1) brightness(1.05) drop-shadow(0 0 18px rgba(94,234,212,.20));
  }
  .brand .divider{width:1px;height:32px;background:var(--line-strong)}
  .brand .meta{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
  }
  .brand .meta b{color:var(--text);font-weight:500}

  h1{
    font-family:var(--display);font-weight:300;
    font-size:34px;letter-spacing:-.02em;line-height:1.1;
    margin:0 0 10px;
  }
  h1 em{font-style:normal;color:var(--accent);font-weight:400}
  .sub{
    color:var(--muted);font-size:14px;margin:0 0 28px;
    max-width:38ch;
  }

  form{
    display:flex;flex-direction:column;gap:14px;
    padding:24px;
    background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0));
    border:1px solid var(--line);
    border-radius:14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  label{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);
  }
  .field{display:flex;flex-direction:column;gap:8px}
  input{
    width:100%;
    font-family:var(--mono);font-size:14px;color:var(--text);
    background:rgba(0,0,0,.35);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    outline:none;
    transition:border-color .25s var(--ease), box-shadow .25s var(--ease), background .25s var(--ease);
  }
  input:hover{border-color:var(--line-strong)}
  input:focus{
    border-color:var(--accent-strong);
    background:rgba(0,0,0,.55);
    box-shadow:0 0 0 4px rgba(94,234,212,.06);
  }
  input:disabled{opacity:.5;cursor:not-allowed}

  button{
    margin-top:6px;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;
    color:#02110f;background:var(--accent);
    border:1px solid var(--accent);
    border-radius:8px;
    padding:13px 16px;cursor:pointer;
    transition:transform .15s var(--ease), background .25s var(--ease), box-shadow .25s var(--ease);
    box-shadow:0 0 32px -10px var(--accent-strong);
  }
  button:hover{background:#7df1dc;box-shadow:0 0 32px -6px var(--accent-strong)}
  button:active{transform:translateY(1px)}
  button:disabled{
    opacity:.6;cursor:wait;
    background:var(--accent);
  }

  .msg{
    font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;
    padding:10px 12px;border-radius:8px;
    border:1px solid var(--line);
    min-height:0;
    display:none;
  }
  .msg.show{display:block}
  .msg.err{
    color:#fecaca;background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.35);
  }
  .msg.warn{
    color:#fde68a;background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.30);
  }

  .footer{
    margin-top:22px;display:flex;justify-content:space-between;align-items:center;gap:10px;
    font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--dim);
  }
  .footer a{color:var(--dim);text-decoration:none;border-bottom:1px solid transparent;transition:.2s var(--ease)}
  .footer a:hover{color:var(--muted);border-bottom-color:var(--muted)}

  .classified{
    margin-top:18px;text-align:center;
    font-family:var(--mono);font-size:10px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--danger);opacity:.6;
  }
</style>
</head>
<body>
<main class="stage">

  <span class="badge"><span class="dot"></span>Restricted · Auth required</span>

  <div class="brand">
    <img src="logo.png" alt="Onyx Smart Technologies">
    <span class="divider"></span>
    <span class="meta">Tracer<br><b>Cyber</b></span>
  </div>

  <h1>Sign in to view <em>classified research</em>.</h1>
  <p class="sub">Tracer Cyber is restricted to authorized personnel. Use your Onyx credentials to continue.</p>

  <form id="login-form" method="POST" autocomplete="on" novalidate>
    <div id="banner" class="msg" role="status" aria-live="polite"></div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>

    <button id="submit" type="submit">Authenticate</button>
  </form>

  <div class="footer">
    <a href="/">&larr; Back to onyx</a>
    <span>© 2026 Onyx Smart Technologies</span>
  </div>

  <div class="classified">// Unauthorized access prohibited</div>

</main>

<script>
(function(){
  // Production API base. Override via ?api=https://... for local/dev testing.
  var DEFAULT_API_BASE = 'https://8g62kxma73.us-east-1.awsapprunner.com';
  var params = new URLSearchParams(window.location.search);
  var API_BASE = (params.get('api') || DEFAULT_API_BASE).replace(/\/$/, '');

  var form = document.getElementById('login-form');
  var userEl = document.getElementById('username');
  var passEl = document.getElementById('password');
  var submitEl = document.getElementById('submit');
  var banner = document.getElementById('banner');

  // Point the form at the cyber form-login endpoint. We use form submission
  // (not XHR) so the browser handles the cross-origin POST + Set-Cookie + 303
  // redirect without CORS in the way. The redirected /api/cyber/index.html
  // GET is a top-level navigation that carries the SameSite=Lax cookie.
  form.action = API_BASE + '/api/cyber/_login';

  function showBanner(text, kind){
    banner.className = 'msg show ' + (kind || 'err');
    banner.textContent = text;
  }

  // Surface the reason for being on this page (set by the API on redirect).
  var REASONS = {
    auth_required:       ['warn', 'Authentication required — please sign in to continue.'],
    session_expired:     ['warn', 'Your session expired. Please sign in again.'],
    invalid_credentials: ['err',  'Invalid username or password.'],
    account_blocked:     ['err',  'This account is blocked. Contact an administrator.'],
    session_create_failed: ['err','Could not start a session. Please try again.']
  };
  var reason = params.get('reason');
  if (reason && REASONS[reason]) {
    showBanner(REASONS[reason][1], REASONS[reason][0]);
  }

  form.addEventListener('submit', function(){
    // Client-side validation is handled by `required` attrs + browser UX.
    // Just lock the UI while the browser navigates.
    submitEl.disabled = true;
    submitEl.textContent = 'Authenticating…';
  });

  // Tiny UX nicety — autofocus the right field.
  setTimeout(function(){
    (userEl.value ? passEl : userEl).focus();
  }, 50);
})();
</script>
</body>
</html>
